<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="860" viewBox="0 0 1180 860">
  <style>
    .box { fill: #ffffff; stroke: #22313f; stroke-width: 1.5; }
    .title { fill: #e8eef4; stroke: #22313f; stroke-width: 1.5; }
    .text { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #111827; }
    .small { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #111827; }
    .head { font-family: Arial, Helvetica, sans-serif; font-size: 16px; font-weight: bold; fill: #111827; }
    .line { stroke: #22313f; stroke-width: 1.5; fill: none; }
    .dash { stroke: #22313f; stroke-width: 1.5; fill: none; stroke-dasharray: 5 4; }
  </style>

  <defs>
    <marker id="triangle" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 10 5 L 0 0 L 0 10 Z" fill="#ffffff" stroke="#22313f" />
    </marker>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22313f" />
    </marker>
    <marker id="diamond" viewBox="0 0 12 12" refX="0" refY="6" markerWidth="12" markerHeight="12" orient="auto">
      <path d="M 0 6 L 6 0 L 12 6 L 6 12 Z" fill="#ffffff" stroke="#22313f" />
    </marker>
  </defs>

  <text x="590" y="35" text-anchor="middle" class="head">Diagrama de Classes - Biblioteca Facil</text>

  <g transform="translate(410 70)">
    <rect class="box" width="330" height="170"/>
    <rect class="title" width="330" height="36"/>
    <text x="165" y="23" text-anchor="middle" class="head">Pessoa</text>
    <text x="16" y="58" class="small">&lt;&lt;abstract&gt;&gt;</text>
    <text x="16" y="80" class="text">- id: int</text>
    <text x="16" y="100" class="text">- nome: String</text>
    <text x="16" y="120" class="text">- email: String</text>
    <line x1="0" y1="132" x2="330" y2="132" class="line"/>
    <text x="16" y="154" class="text">+ exibirDados(): String</text>
  </g>

  <g transform="translate(120 310)">
    <rect class="box" width="300" height="130"/>
    <rect class="title" width="300" height="36"/>
    <text x="150" y="23" text-anchor="middle" class="head">Usuario</text>
    <text x="16" y="62" class="text">- matricula: String</text>
    <line x1="0" y1="78" x2="300" y2="78" class="line"/>
    <text x="16" y="102" class="text">+ getMatricula(): String</text>
    <text x="16" y="122" class="text">+ exibirDados(): String</text>
  </g>

  <g transform="translate(730 310)">
    <rect class="box" width="300" height="130"/>
    <rect class="title" width="300" height="36"/>
    <text x="150" y="23" text-anchor="middle" class="head">Bibliotecario</text>
    <text x="16" y="62" class="text">- cargo: String</text>
    <line x1="0" y1="78" x2="300" y2="78" class="line"/>
    <text x="16" y="102" class="text">+ getCargo(): String</text>
    <text x="16" y="122" class="text">+ exibirDados(): String</text>
  </g>

  <g transform="translate(60 570)">
    <rect class="box" width="330" height="190"/>
    <rect class="title" width="330" height="36"/>
    <text x="165" y="23" text-anchor="middle" class="head">Livro</text>
    <text x="16" y="62" class="text">- id: int</text>
    <text x="16" y="82" class="text">- titulo: String</text>
    <text x="16" y="102" class="text">- autor: String</text>
    <text x="16" y="122" class="text">- anoPublicacao: int</text>
    <text x="16" y="142" class="text">- disponivel: boolean</text>
    <line x1="0" y1="152" x2="330" y2="152" class="line"/>
    <text x="16" y="174" class="text">+ emprestar(): boolean</text>
  </g>

  <g transform="translate(430 570)">
    <rect class="box" width="330" height="210"/>
    <rect class="title" width="330" height="36"/>
    <text x="165" y="23" text-anchor="middle" class="head">Emprestimo</text>
    <text x="16" y="62" class="text">- id: int</text>
    <text x="16" y="82" class="text">- usuario: Usuario</text>
    <text x="16" y="102" class="text">- livro: Livro</text>
    <text x="16" y="122" class="text">- dataEmprestimo: LocalDate</text>
    <text x="16" y="142" class="text">- dataDevolucao: LocalDate</text>
    <text x="16" y="162" class="text">- ativo: boolean</text>
    <line x1="0" y1="172" x2="330" y2="172" class="line"/>
    <text x="16" y="194" class="text">+ finalizarEmprestimo(): void</text>
  </g>

  <g transform="translate(800 560)">
    <rect class="box" width="330" height="230"/>
    <rect class="title" width="330" height="36"/>
    <text x="165" y="23" text-anchor="middle" class="head">Biblioteca</text>
    <text x="16" y="62" class="text">- livros: ArrayList&lt;Livro&gt;</text>
    <text x="16" y="82" class="text">- usuarios: ArrayList&lt;Usuario&gt;</text>
    <text x="16" y="102" class="text">- emprestimos: ArrayList&lt;Emprestimo&gt;</text>
    <line x1="0" y1="114" x2="330" y2="114" class="line"/>
    <text x="16" y="138" class="text">+ cadastrarLivro(livro): void</text>
    <text x="16" y="158" class="text">+ cadastrarUsuario(usuario): void</text>
    <text x="16" y="178" class="text">+ realizarEmprestimo(...): boolean</text>
    <text x="16" y="198" class="text">+ realizarDevolucao(...): boolean</text>
    <text x="16" y="218" class="text">+ listarEmprestimosAtivos(): void</text>
  </g>

  <g transform="translate(470 345)">
    <rect class="box" width="220" height="80"/>
    <rect class="title" width="220" height="36"/>
    <text x="110" y="23" text-anchor="middle" class="head">Main</text>
    <text x="16" y="62" class="text">+ main(args): void</text>
  </g>

  <line x1="270" y1="310" x2="493" y2="240" class="line" marker-end="url(#triangle)"/>
  <line x1="880" y1="310" x2="657" y2="240" class="line" marker-end="url(#triangle)"/>
  <line x1="430" y1="675" x2="390" y2="675" class="line" marker-end="url(#arrow)"/>
  <line x1="530" y1="570" x2="330" y2="440" class="line" marker-end="url(#arrow)"/>
  <line x1="800" y1="620" x2="760" y2="640" class="line" marker-start="url(#diamond)"/>
  <line x1="800" y1="690" x2="390" y2="690" class="line" marker-start="url(#diamond)"/>
  <line x1="960" y1="560" x2="650" y2="425" class="dash" marker-end="url(#arrow)"/>
</svg>

